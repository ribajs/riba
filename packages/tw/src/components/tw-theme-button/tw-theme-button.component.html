<!-- Dropdown mode: select element -->
<div rv-if="mode | eq 'dropdown'" class="inline-block">
  <select
    rv-on-change="selectTheme"
    rv-value="selected"
    aria-label="Select a theme"
    class="rounded-md border border-gray-300 bg-white px-3 py-1.5 text-sm text-gray-900 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500 dark:border-gray-600 dark:bg-gray-800 dark:text-white dark:focus:border-blue-400 dark:focus:ring-blue-400"
  >
    <option rv-each-choice="choices" rv-value="choice" rv-html="labels | get choice"></option>
  </select>
</div>

<!-- Icon mode: toggle button -->
<button
  rv-if="mode | eq 'icon'"
  rv-on-click="toggleTheme"
  type="button"
  aria-label="Toggle theme"
  class="rounded-md p-2 text-gray-500 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200"
>
  <!-- Sun icon (shown in light mode / dark: hidden) -->
  <svg
    class="h-6 w-6 dark:hidden"
    rv-style-width="iconSize | append 'px'"
    rv-style-height="iconSize | append 'px'"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    aria-hidden="true"
  >
    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
  </svg>
  <!-- Moon icon (hidden in light mode / shown in dark:) -->
  <svg
    class="hidden h-6 w-6 dark:block"
    rv-style-width="iconSize | append 'px'"
    rv-style-height="iconSize | append 'px'"
    fill="none"
    viewBox="0 0 24 24"
    stroke-width="1.5"
    stroke="currentColor"
    aria-hidden="true"
  >
    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
  </svg>
</button>
