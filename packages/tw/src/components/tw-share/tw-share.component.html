<div class="relative inline-block text-left">
  <!-- Share trigger button -->
  <button
    type="button"
    class="inline-flex items-center gap-2 rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-gray-900"
    rv-on-click="share"
  >
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314m0 0a2.25 2.25 0 103.935 2.186 2.25 2.25 0 00-3.935-2.186zm0-12.814a2.25 2.25 0 103.933-2.185 2.25 2.25 0 00-3.933 2.185z" />
    </svg>
    Share
  </button>

  <!-- Dropdown menu (fallback when native share is not available) -->
  <div
    rv-if="menuOpen"
    class="absolute left-0 z-10 mt-2 w-48 origin-top-left rounded-md bg-white shadow-lg ring-1 ring-black/5 focus:outline-none dark:bg-gray-800 dark:ring-gray-700"
  >
    <div class="py-1" rv-each-item="shareItems">
      <div rv-show="item.available">
        <!-- Regular link (email, etc.) -->
        <a
          rv-show="item.type | eq 'href'"
          class="block cursor-pointer px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700"
          rv-href="item.url"
          rv-text="item.label"
        ></a>
        <!-- Popup or clipboard action -->
        <button
          rv-hide="item.type | eq 'href'"
          type="button"
          class="block w-full cursor-pointer px-4 py-2 text-left text-sm text-gray-700 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-700"
          rv-on-click="shareOnService | args item"
          rv-text="item.label"
        ></button>
      </div>
    </div>
  </div>
</div>
