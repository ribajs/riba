<dialog aria-modal="true" class="fixed inset-0 z-50 m-0 flex h-full w-full items-center justify-center bg-transparent p-0">
  <div class="fixed inset-0 bg-gray-500/75 transition-opacity dark:bg-gray-900/75" rv-on-click="dismiss"></div>
  <div class="relative z-10 w-full max-w-lg transform overflow-hidden rounded-lg bg-white shadow-xl transition-all dark:bg-gray-800 sm:mx-4">
    <div rv-if="modal.title" class="flex items-center justify-between border-b border-gray-200 px-6 py-4 dark:border-gray-700">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white" rv-template="modal.title"></h3>
      <button
        type="button"
        class="rounded-md text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-gray-500 dark:hover:text-gray-400"
        rv-on-click="dismiss"
      >
        <span class="sr-only">Close</span>
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
    <div class="px-6 py-4">
      <p class="text-sm text-gray-700 dark:text-gray-300" rv-template="modal.message"></p>
    </div>
    <div rv-if="modal.closable" class="flex justify-end gap-2 border-t border-gray-200 px-6 py-4 dark:border-gray-700">
      <button
        type="button"
        class="rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 dark:bg-gray-700 dark:text-gray-300 dark:ring-gray-600 dark:hover:bg-gray-600"
        rv-on-click="dismiss"
      >
        Close
      </button>
    </div>
  </div>
</dialog>
