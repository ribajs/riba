<div
  class="pointer-events-auto w-full max-w-sm overflow-hidden rounded-lg bg-white shadow-lg ring-1 ring-black/5 dark:bg-gray-800 dark:ring-white/10"
  role="alert"
  aria-live="assertive"
  aria-atomic="true"
>
  <div class="p-4">
    <div class="flex items-start">
      <div rv-if="iconUrl" class="shrink-0">
        <tw-icon rv-src="iconUrl" size="20" class="text-gray-400"></tw-icon>
      </div>
      <div class="ml-3 w-0 flex-1 pt-0.5" rv-class-ml-0="iconUrl | not">
        <p rv-if="toast.title" class="text-sm font-medium text-gray-900 dark:text-white" rv-text="toast.title"></p>
        <p class="mt-1 text-sm text-gray-500 dark:text-gray-400" rv-template="toast.message"></p>
      </div>
      <div class="ml-4 flex shrink-0">
        <button
          type="button"
          class="inline-flex rounded-md bg-white text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:bg-gray-800 dark:text-gray-500 dark:hover:text-gray-400"
          rv-on-click="dismiss"
        >
          <span class="sr-only">Close</span>
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
