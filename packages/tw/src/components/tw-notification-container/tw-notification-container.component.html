<div class="pointer-events-none z-50 flex flex-col items-end gap-2" rv-add-class="positionClass">
  <div rv-each-toast="notifications">
    <div rv-if="toast.type | eq 'toast'">
      <tw-toast-item rv-index="%toast%" rv-parent rv-icon-url="iconUrl" rv-co-toast="toast"></tw-toast-item>
    </div>
  </div>
</div>
<div rv-each-modal="notifications">
  <div rv-if="modal.type | eq 'modal'">
    <tw-modal-item rv-index="%modal%" rv-parent rv-icon-url="iconUrl" rv-co-modal="modal"></tw-modal-item>
  </div>
</div>
