<div class="inline-flex flex-col gap-2">
  <label rv-if="label" class="text-sm font-medium text-gray-700 dark:text-gray-300" rv-text="label"></label>
  <div class="flex items-center gap-3">
    <!-- Color swatch preview -->
    <div
      class="h-10 w-10 shrink-0 cursor-pointer rounded-lg border border-gray-300 shadow-sm dark:border-gray-600"
      rv-style-background-color="value"
    >
      <input
        type="color"
        aria-label="Color picker"
        class="h-full w-full cursor-pointer opacity-0"
        rv-value="value"
        rv-on-input="onInput"
        rv-on-change="onChange"
      />
    </div>

    <!-- Hex value display -->
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-md bg-gray-100 px-3 py-2 font-mono text-sm text-gray-700 transition-colors hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:text-gray-300 dark:hover:bg-gray-600"
      rv-on-click="copyHex"
      title="Click to copy"
    >
      <span rv-text="value"></span>
      <!-- Copy icon -->
      <svg rv-if="copied | not" class="h-4 w-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" />
      </svg>
      <!-- Check icon (copied) -->
      <svg rv-if="copied" class="h-4 w-4 text-green-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
    </button>
  </div>
</div>
