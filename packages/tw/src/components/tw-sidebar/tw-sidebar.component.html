<!-- Backdrop overlay (shown in overlap mode) -->
<div
  rv-if="state | eq 'overlap-left' | or state | eq 'overlap-right'"
  rv-on-click="hide"
  class="fixed inset-0 z-40 bg-black/50 transition-opacity duration-300"
></div>

<!-- Sidebar panel -->
<aside
  class="fixed top-0 z-50 flex h-full flex-col overflow-y-auto bg-white shadow-lg transition-transform duration-300 ease-in-out dark:bg-gray-800"
  rv-style-width="width"
  rv-class-left-0="position | eq 'left'"
  rv-class-right-0="position | eq 'right'"
>
  <!-- Close button -->
  <div class="flex items-center justify-end p-4">
    <button
      type="button"
      rv-on-click="hide"
      class="rounded-md p-1 text-gray-500 hover:bg-gray-100 hover:text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-gray-200"
      aria-label="Close sidebar"
    >
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Sidebar content -->
  <div class="flex-1 px-4 pb-4">
    <slot></slot>
  </div>
</aside>
