<div class="slider-inner relative overflow-hidden w-full">
  <!-- Slides container -->
  <div class="slider-row flex overflow-x-auto scroll-smooth snap-x snap-mandatory scrollbar-none gap-4" rv-style="slideItemStyle">
    <!-- Slides from template -->
    <div rv-if="slideTemplate" rv-each-item="items" class="slide shrink-0 snap-start" rv-class-active="item.active" rv-data-index="item.index" rv-template="slideTemplate">
    </div>
  </div>

  <!-- Controls -->
  <div rv-if="showControls" class="slider-controls absolute inset-0 flex items-center justify-between pointer-events-none z-10" rv-class="controlsPositionClass">
    <button
      class="slider-control-prev pointer-events-auto flex items-center justify-center w-8 h-8 rounded-full bg-gray-800/60 text-white hover:bg-gray-800/80 transition-colors disabled:opacity-30 disabled:cursor-not-allowed ml-1"
      rv-on-click="prev"
      rv-disabled="enablePrevControl | not"
      aria-label="Previous"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </button>
    <button
      class="slider-control-next pointer-events-auto flex items-center justify-center w-8 h-8 rounded-full bg-gray-800/60 text-white hover:bg-gray-800/80 transition-colors disabled:opacity-30 disabled:cursor-not-allowed mr-1"
      rv-on-click="next"
      rv-disabled="enableNextControl | not"
      aria-label="Next"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </div>

  <!-- Indicators -->
  <div rv-if="showIndicators" class="slider-indicators flex justify-center gap-1.5 mt-3" rv-class="indicatorsPositionClass">
    <button
      rv-each-item="items"
      class="w-2 h-2 rounded-full transition-colors"
      rv-class-bg-gray-800="item.active"
      rv-class-bg-gray-300="item.active | not"
      rv-on-click="goTo"
      rv-data-index="item.index"
      aria-label="Go to item"
    ></button>
  </div>
</div>
