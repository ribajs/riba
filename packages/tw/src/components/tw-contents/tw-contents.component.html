<nav class="rounded-lg border border-gray-200 bg-white p-4 dark:border-gray-700 dark:bg-gray-800">
  <!-- Optional toggle header -->
  <div rv-if="showToggle" class="flex items-center justify-between">
    <h4 class="text-sm font-semibold text-gray-900 dark:text-white">Table of Contents</h4>
    <button
      type="button"
      class="rounded-md p-1 text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-gray-500 dark:hover:text-gray-300"
      rv-on-click="toggle"
    >
      <svg
        class="h-4 w-4 transition-transform duration-200"
        rv-class-rotate-180="collapsed | not"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
      </svg>
    </button>
  </div>

  <!-- TOC list -->
  <ul rv-unless="collapsed" class="mt-2 list-none space-y-1 pl-0">
    <li rv-each-anchor="anchors">
      <a
        class="block rounded-md px-2 py-1 text-sm text-gray-700 transition-colors hover:bg-gray-100 hover:text-blue-600 dark:text-gray-300 dark:hover:bg-gray-700 dark:hover:text-blue-400"
        rv-href="anchor.href"
        rv-text="anchor.title"
      ></a>

      <!-- Level 2 -->
      <ul rv-if="anchor.childs | size | gt 0" class="mt-1 list-none space-y-1 pl-4">
        <li rv-each-child="anchor.childs">
          <a
            class="block rounded-md px-2 py-1 text-sm text-gray-600 transition-colors hover:bg-gray-100 hover:text-blue-600 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-blue-400"
            rv-href="child.href"
            rv-text="child.title"
          ></a>

          <!-- Level 3 -->
          <ul rv-if="child.childs | size | gt 0" class="mt-1 list-none space-y-1 pl-4">
            <li rv-each-childchild="child.childs">
              <a
                class="block rounded-md px-2 py-1 text-sm text-gray-500 transition-colors hover:bg-gray-100 hover:text-blue-600 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-blue-400"
                rv-href="childchild.href"
                rv-text="childchild.title"
              ></a>

              <!-- Level 4 -->
              <ul rv-if="childchild.childs | size | gt 0" class="mt-1 list-none space-y-1 pl-4">
                <li rv-each-childchildchild="childchild.childs">
                  <a
                    class="block rounded-md px-2 py-1 text-sm text-gray-500 transition-colors hover:bg-gray-100 hover:text-blue-600 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-blue-400"
                    rv-href="childchildchild.href"
                    rv-text="childchildchild.title"
                  ></a>
                </li>
              </ul>
            </li>
          </ul>
        </li>
      </ul>
    </li>
  </ul>
