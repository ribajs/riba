<div
  class="inline-flex items-center gap-1"
  rv-class-cursor-pointer="readonly | not"
  rv-class-cursor-default="readonly"
  rv-on-mouseleave="onLeave"
  role="radiogroup"
  aria-label="Rating"
>
  <button
    rv-each-star="stars"
    type="button"
    class="inline-flex items-center border-0 bg-transparent p-0 transition-transform hover:scale-110 focus:outline-none"
    rv-class-cursor-pointer="readonly | not"
    rv-class-cursor-default="readonly"
    rv-on-click="setRating | args star"
    rv-on-mouseenter="onHover | args star"
    rv-disabled="readonly"
    rv-aria-label="star.index | plus 1 | append ' star'"
  >
    <!-- Filled star -->
    <svg
      rv-if="star.filled"
      rv-class="sizeClass"
      class="text-yellow-400"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
    </svg>

    <!-- Half star -->
    <svg
      rv-if="star.half"
      rv-class="sizeClass"
      class="text-yellow-400"
      viewBox="0 0 24 24"
    >
      <defs>
        <linearGradient rv-id="star.index | prepend 'half-'" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="50%" stop-color="currentColor" />
          <stop offset="50%" stop-color="#D1D5DB" />
        </linearGradient>
      </defs>
      <path
        rv-fill="star.index | prepend 'url(#half-' | append ')'"
        d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
      />
    </svg>

    <!-- Empty star -->
    <svg
      rv-if="star.filled | not | and star.half | not"
      rv-class="sizeClass"
      class="text-gray-300 dark:text-gray-600"
      fill="currentColor"
      viewBox="0 0 24 24"
    >
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
    </svg>
  </button>
</div>
