<div
  rv-if="visible"
  role="alert"
  rv-class-bg-blue-50="type | eq 'info'"
  rv-class-dark:bg-blue-900="type | eq 'info'"
  rv-class-text-blue-800="type | eq 'info'"
  rv-class-dark:text-blue-200="type | eq 'info'"
  rv-class-border-blue-300="type | eq 'info'"
  rv-class-dark:border-blue-700="type | eq 'info'"
  rv-class-bg-green-50="type | eq 'success'"
  rv-class-dark:bg-green-900="type | eq 'success'"
  rv-class-text-green-800="type | eq 'success'"
  rv-class-dark:text-green-200="type | eq 'success'"
  rv-class-border-green-300="type | eq 'success'"
  rv-class-dark:border-green-700="type | eq 'success'"
  rv-class-bg-yellow-50="type | eq 'warning'"
  rv-class-dark:bg-yellow-900="type | eq 'warning'"
  rv-class-text-yellow-800="type | eq 'warning'"
  rv-class-dark:text-yellow-200="type | eq 'warning'"
  rv-class-border-yellow-300="type | eq 'warning'"
  rv-class-dark:border-yellow-700="type | eq 'warning'"
  rv-class-bg-red-50="type | eq 'error'"
  rv-class-dark:bg-red-900="type | eq 'error'"
  rv-class-text-red-800="type | eq 'error'"
  rv-class-dark:text-red-200="type | eq 'error'"
  rv-class-border-red-300="type | eq 'error'"
  rv-class-dark:border-red-700="type | eq 'error'"
  class="flex items-center rounded-lg border p-4"
>
  <div rv-if="icon" class="mr-3 shrink-0">
    <svg rv-if="type | eq 'info'" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd" />
    </svg>
    <svg rv-if="type | eq 'success'" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
    </svg>
    <svg rv-if="type | eq 'warning'" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
    </svg>
    <svg rv-if="type | eq 'error'" class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
    </svg>
  </div>
  <div class="flex-1">
    <p rv-if="title" class="text-sm font-semibold" rv-text="title"></p>
    <p class="text-sm" rv-text="message"></p>
  </div>
  <button
    rv-if="dismissible"
    type="button"
    class="ml-3 inline-flex shrink-0 cursor-pointer rounded-lg p-1.5 focus:outline-none focus:ring-2 focus:ring-offset-2 opacity-70 hover:opacity-100"
    rv-on-click="dismiss"
  >
    <span class="sr-only">Dismiss</span>
    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
      <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
    </svg>
  </button>
</div>
