<div class="w-full" role="progressbar" rv-aria-valuenow="value" rv-aria-valuemin="0" rv-aria-valuemax="max">
  <!-- Label above bar -->
  <div rv-if="showLabel" class="mb-1 flex justify-between text-sm">
    <span class="font-medium text-gray-700 dark:text-gray-300">Progress</span>
    <span class="text-gray-500 dark:text-gray-400">{percentage}%</span>
  </div>

  <!-- Track -->
  <div class="w-full overflow-hidden rounded-full bg-gray-200 dark:bg-gray-700" rv-class="barHeightClass">
    <!-- Fill bar -->
    <div
      class="rounded-full transition-all duration-300 ease-in-out"
      rv-class="barColorClass"
      rv-class="barHeightClass"
      rv-style-width="percentage | append '%'"
      rv-class-tw-progress-striped="striped"
      rv-class-tw-progress-animated="animated"
    ></div>
  </div>
</div>

<style>
  .tw-progress-striped {
    background-image: linear-gradient(
      45deg,
      rgba(255, 255, 255, 0.15) 25%,
      transparent 25%,
      transparent 50%,
      rgba(255, 255, 255, 0.15) 50%,
      rgba(255, 255, 255, 0.15) 75%,
      transparent 75%,
      transparent
    );
    background-size: 1rem 1rem;
  }

  .tw-progress-animated {
    animation: tw-progress-stripes 1s linear infinite;
  }

  @keyframes tw-progress-stripes {
    0% {
      background-position: 1rem 0;
    }
    100% {
      background-position: 0 0;
    }
  }
</style>
