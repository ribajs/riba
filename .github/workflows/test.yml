name: Test
on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin: Node 24.15.0 regresses Yarn PnP's ESM loader (EBADF on CJS wrap
          # of unrs-resolver + iconset postinstall). Revisit when Node fixes it.
          node-version: '24.14.1'
      - name: Install dependencies
        run: |
          yarn --version
          yarn install
      - name: Test
        run: |
          yarn run test
