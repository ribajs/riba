name: Lint
on:
  pull_request:
  push:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: |
          yarn --version
          yarn install
      - name: Lint source files
        run: |
          yarn run lint
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
