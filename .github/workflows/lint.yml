name: Lint
on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin: Node 24.15.0 introduced changes that trip Yarn PnP consumers. Yarn
          # 4.14.1 handled one regression (EBADF fstat during install), but ESLint 10's
          # config loader still crashes on 24.15 with "Cannot convert undefined or null
          # to object" at require.cache access. Revisit once upstream ships a fix.
          node-version: '24.14.1'
      - name: Install dependencies
        run: |
          yarn --version
          yarn install
      - name: Format source files
        run: |
          yarn run format
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
