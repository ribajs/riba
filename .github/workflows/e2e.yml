name: E2E Tests

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin: Node 24.15.0 introduced changes that trip Yarn PnP consumers. Yarn
          # 4.14.1 handled one regression (EBADF fstat during install), but ESLint 10's
          # config loader still crashes on 24.15 with "Cannot convert undefined or null
          # to object" at require.cache access. Revisit once upstream ships a fix.
          node-version: "24.14.1"

      - name: Install dependencies
        run: yarn install

      - name: Install Playwright browsers
        run: yarn playwright install --with-deps chromium

      - name: Build library packages
        run: yarn build:libs

      - name: Run E2E tests
        run: yarn test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
