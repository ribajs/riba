name: Deploy Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    strategy:
      matrix:
        # Pin: Node 24.15.0 introduced changes that trip Yarn PnP consumers. Yarn
        # 4.14.1 handled one regression (EBADF fstat during install), but ESLint 10's
        # config loader still crashes on 24.15 with "Cannot convert undefined or null
        # to object" at require.cache access. Revisit once upstream ships a fix.
        node-version: [24.14.1]

    steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: "yarn"
    - name: Install dependencies
      run: yarn install
    - name: Build documentation
      run: yarn workspace @ribajs/doc run build
    - name: Setup Pages
      uses: actions/configure-pages@v5
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: './infra/doc/_site'
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
