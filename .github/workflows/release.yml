name: Release to NPM

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag for manual run'
        required: false
        default: 'manual'

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Pin: Node 24.15.0 introduced changes that trip Yarn PnP consumers. Yarn
          # 4.14.1 handled one regression (EBADF fstat during install), but ESLint 10's
          # config loader still crashes on 24.15 with "Cannot convert undefined or null
          # to object" at require.cache access. Revisit once upstream ships a fix.
          node-version: '24.14.1'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Yarn for npm publishing
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          corepack enable
          yarn config set npmRegistryServer "https://registry.npmjs.org"
          yarn config set npmAlwaysAuth true
          yarn config set npmAuthToken "$NODE_AUTH_TOKEN"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Type check
        run: yarn run check:all

      - name: Build libraries
        run: yarn run build:libs

      - name: Run unit tests
        run: yarn test

      - name: Publish packages to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: yarn workspaces foreach -v -W --no-private npm publish --tolerate-republish --tag latest --access public

      - name: Summary
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.release_tag || 'unknown' }}
        run: echo "Packages successfully published to npm for release $RELEASE_TAG"
