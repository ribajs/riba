<div class="alert alert-info" rv-hide="hasName">
  Select an icon from the <a href="./iconset.html">iconset overview</a> to open the detail page.
</div>

<div rv-show="hasName">
  <h2 rv-text="name"></h2>

  <!-- Sizes -->
  <div class="row">
    <section id="sizes" class="col-12">
        <h3>Sizes</h3>
        <div class="row">
            <div class="col-4 col-md-2 col-xl-2 py-2" rv-each-size="sizes">
                <div class="row">
                    <div class="col-12 d-flex justify-content-center flex-row">
                      <bs5-icon class='m-1' rv-src="src" rv-size="size" color='black'></bs5-icon>
                    </div>
                </div>
                <div class="row">
                  <div class="col-12 text-center" rv-text="size"></div>
                </div>
            </div>
        </div>
    </section>
  </div>

  <!-- Colors -->
  <div class="row">
    <section id="colors" class="col-12">
      <h3>Colors</h3>
      <div class="row">
        <div class="col-4 col-md-2 col-xl-2 py-2" rv-each-color="colors" rv-add-class="color | prepend 'example-color-'">
          <div class="row">
            <div class="col-12 d-flex justify-content-center flex-row">
              <bs5-icon class='m-1' rv-src="src" size="32" rv-color="color"></bs5-icon>
            </div>
          </div>
          <div class="row">
            <div class="col-12 text-center" rv-text="color"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Directions -->
  <div class="row">
    <section id="directions" class="col-12">
      <h3>Directions</h3>
      <div class="row">
        <div class="col-4 col-md-2 col-xl-2 py-2" rv-each-direction="directions">
          <div class="row">
            <div class="col-12 d-flex justify-content-center flex-row">
              <bs5-icon class='m-1' rv-src="src" size="32" rv-direction='direction'></bs5-icon>
            </div>
          </div>
          <div class="row">
            <div class="col-12 text-center" rv-text="direction"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- Example -->
  <div class="row">
    <section id="example" class="col-12">
      <h3>Example</h3>
      <pre class="language-html"><code class="language-html"></code></pre>
    </section>
  </div>
</div>
